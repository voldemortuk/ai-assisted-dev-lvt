<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceler × e& — AI Builder Program (Non-Executive)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111; font-family: sans-serif; overflow: hidden; }
    #viewer { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
    #slide-wrap { position: relative; width: 1280px; height: 720px; transform-origin: center center; }
    #slide-frame { width: 1280px; height: 720px; border: none; display: block; }
    .nav-btn { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.12); border: none; color: #fff; font-size: 24px; width: 44px; height: 64px; border-radius: 6px; cursor: pointer; z-index: 100; transition: background 0.15s; display: flex; align-items: center; justify-content: center; }
    .nav-btn:hover { background: rgba(255,255,255,0.28); }
    #btn-prev { left: 12px; }
    #btn-next { right: 12px; }
    #dot-track { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 100; flex-wrap: wrap; justify-content: center; max-width: 90vw; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.3); cursor: pointer; transition: background 0.15s, transform 0.15s; }
    .dot.active { background: #fff; transform: scale(1.3); }
    #slide-label { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 0.06em; z-index: 100; white-space: nowrap; transition: opacity 0.2s; }
    #slide-label.hidden { opacity: 0; }
    #label-btn { position: fixed; top: 10px; right: 14px; background: rgba(255,255,255,0.1); border: none; color: rgba(255,255,255,0.5); font-size: 11px; padding: 4px 10px; border-radius: 4px; cursor: pointer; z-index: 100; }
    #label-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }
  </style>
</head>
<body>
<div id="viewer">
  <div id="slide-wrap">
    <iframe id="slide-frame" allowfullscreen></iframe>
  </div>
</div>
<button class="nav-btn" id="btn-prev">&#8592;</button>
<button class="nav-btn" id="btn-next">&#8594;</button>
<div id="dot-track"></div>
<div id="slide-label"></div>
<button id="label-btn">Hide Labels</button>
<script>
const DECK = '/Decks/lvt_claude_code/';
let slides = [], current = 0, labelsVisible = true;
const frame = document.getElementById('slide-frame');
const label = document.getElementById('slide-label');
const dotTrack = document.getElementById('dot-track');
const labelBtn = document.getElementById('label-btn');
const slideWrap = document.getElementById('slide-wrap');
function scale() {
  const s = Math.min(window.innerWidth / 1280, window.innerHeight / 720) * 0.96;
  slideWrap.style.transform = `scale(${s})`;
}
function goTo(i) {
  current = Math.max(0, Math.min(slides.length - 1, i));
  const s = slides[current];
  frame.src = DECK + s.src;
  label.textContent = (current + 1) + ' · ' + s.name;
  document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === current));
}
function toggleLabels() {
  labelsVisible = !labelsVisible;
  label.classList.toggle('hidden', !labelsVisible);
  labelBtn.textContent = labelsVisible ? 'Hide Labels' : 'Show Labels';
}
function buildDots() {
  dotTrack.innerHTML = '';
  slides.forEach((s, i) => {
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.title = s.name;
    dot.addEventListener('click', () => goTo(i));
    dotTrack.appendChild(dot);
  });
}
document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') goTo(current - 1);
  if (e.key === 'l' || e.key === 'L') toggleLabels();
});
labelBtn.addEventListener('click', toggleLabels);
window.addEventListener('resize', scale);
fetch(DECK + 'deck.json').then(r => r.json()).then(data => {
  slides = data.slides.map(src => ({ src, name: src.replace('.html', '') }));
  buildDots(); scale(); goTo(0);
}).catch(err => {
  label.textContent = 'Error loading deck.json — check console';
  label.style.color = '#f87171'; console.error(err);
});
</script>
</body>
</html>
